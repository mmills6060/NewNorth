services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: newnorth
      MYSQL_DATABASE: newnorth
      MYSQL_USER: newnorth
      MYSQL_PASSWORD: newnorth
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-unewnorth", "-pnewnorth"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  mysql_data:
